<!DOCTYPE html>
<html>
<head>
    <!--
      If you are serving your web app in a path other than the root, change the
      href value below to reflect the base path you are serving from.

      The path provided below has to start and end with a slash "/" in order for
      it to work correctly.

      For more details:
      * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

      This is a placeholder for base href that will be replaced by the value of
      the `--base-href` argument provided to `flutter build`.
    -->
    <base href="$FLUTTER_BASE_HREF">

    <meta charset="UTF-8">
    <meta content="IE=Edge" http-equiv="X-UA-Compatible">
    <meta name="description" content="Rental Hub - Rent or Buy Items Easily">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">

    <!-- iOS meta tags & icons -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Rental Hub">
    <link rel="apple-touch-icon" href="icons/Icon-192.png">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png"/>

    <title>Rental Hub - Rent or Buy Items</title>
    <link rel="manifest" href="manifest.json">

    <!-- Google Maps API -->
    <!-- Replace YOUR_GOOGLE_MAPS_API_KEY_HERE with your actual API key -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDzb3jiOzzCoJO-BIPKiKBTAtRtaPC6mPI"></script>

    <!-- Google Maps Flutter plugin compatibility script -->
    <script>
        // This script ensures Google Maps works properly with Flutter web
        (function() {
          // Wait for the Google Maps API to load
          window.initGoogleMaps = function() {
            console.log('Google Maps API loaded successfully');
          };

          // Handle Google Maps loading error
          window.gm_authFailure = function() {
            console.error('Google Maps API key is invalid or not authorized for web');
          };
        })();
    </script>

    <!-- Geocoder bridge for Flutter web (avoids CORS on direct REST calls) -->
    <script>
        window.reverseGeocode = function(lat, lng, callback) {
            if (typeof google === 'undefined' || !google.maps || !google.maps.Geocoder) {
                callback('');
                return;
            }
            var geocoder = new google.maps.Geocoder();
            geocoder.geocode({ location: { lat: lat, lng: lng } }, function(results, status) {
                if (status === 'OK' && results && results.length > 0) {
                    callback(results[0].formatted_address);
                } else {
                    callback('');
                }
            });
        };
    </script>

    <style>
        /* Custom styles for better map experience */
        .gm-style iframe + div {
          border-radius: 12px !important;
        }

        /* Ensure the map container takes proper size */
        .gm-style {
          font-family: 'Roboto', sans-serif;
        }

        /* Style for map controls */
        .gm-style .gm-style-cc,
        .gm-style .gm-style-iw-c {
          border-radius: 12px !important;
        }

        /* Fix for Flutter web canvas */
        canvas {
          outline: none;
        }

        /* Improve touch events on map for mobile */
        .gm-style {
          touch-action: pan-x pan-y;
        }
    </style>
</head>
<body>
<!-- Loading indicator while Flutter is initializing -->
<div id="loading-indicator" style="
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    font-family: 'Roboto', sans-serif;
    z-index: 9999;
  ">
    <div style="
      width: 50px;
      height: 50px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #381932;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    "></div>
    <div style="color: #381932; font-size: 16px;">Loading Rental Hub...</div>
    <style>
        @keyframes spin {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }
    </style>
</div>

<script src="flutter_bootstrap.js" async></script>

<script>
    // Hide loading indicator when Flutter is ready
    window.addEventListener('load', function() {
      // Check if Flutter is loaded
      var checkFlutterReady = setInterval(function() {
        if (typeof _flutter !== 'undefined' && _flutter.loader && _flutter.loader.initialized) {
          var loadingIndicator = document.getElementById('loading-indicator');
          if (loadingIndicator) {
            loadingIndicator.style.display = 'none';
          }
          clearInterval(checkFlutterReady);
        }
      }, 100);

      // Timeout after 10 seconds
      setTimeout(function() {
        var loadingIndicator = document.getElementById('loading-indicator');
        if (loadingIndicator && loadingIndicator.style.display !== 'none') {
          loadingIndicator.style.display = 'none';
        }
        clearInterval(checkFlutterReady);
      }, 10000);
    });
</script>
</body>
</html>
